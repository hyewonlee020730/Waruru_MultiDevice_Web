<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴스룸 — 와르르</title>
  <link rel="stylesheet" href="styles/color_styles.css">
  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="styles/media_styles.css">
  <link rel="stylesheet" href="styles/gnb.css">
  <style>
    html, body {
      background-color: var(--gray-scale-white);
      overflow: auto;
      height: auto;
    }

    /* ── GNB override: white bg ── */
    .gnb {
      background-color: var(--gray-scale-white);
    }
    .gnb .gnb-logo img {
      filter: invert(1);
    }
    .gnb .nav-item {
      color: var(--gray-scale-400);
    }
    .gnb .nav-item.active,
    .gnb .nav-item:hover {
      color: var(--gray-scale-black);
    }
    .gnb .lang-btn {
      color: var(--gray-scale-400);
    }
    .gnb .lang-btn.active {
      color: var(--gray-scale-black);
    }
    .gnb .burger-bar {
      background-color: var(--gray-scale-black);
    }

    /* ── Page Layout ── */
    .page-content {
      padding-top: 68px; /* GNB height */
    }

    .article-wrapper {
      max-width: 1204px;
      margin: 0 auto;
      padding: 110px 40px;
      box-sizing: border-box;
    }

    .article-inner {
      max-width: 796px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 60px;
    }

    /* ── Header ── */
    .article-header {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .article-title {
      color: var(--gray-scale-black);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.4;
      word-break: keep-all;
    }

    .article-date {
      color: var(--gray-scale-400);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
    }

    /* ── Divider ── */
    .article-divider {
      width: 100%;
      height: 1px;
      background-color: var(--gray-scale-100);
    }

    /* ── Body ── */
    .article-body {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .article-text {
      color: var(--gray-scale-800);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.8;
      word-break: keep-all;
    }

    .article-image {
      width: 100%;
      aspect-ratio: 796 / 597;
      background-color: var(--gray-scale-900);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .article-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Footer ── */
    .site-footer {
      width: 100%;
      background-color: var(--gray-scale-50);
      padding: 33px 0;
    }

    .site-footer-inner {
      max-width: 1204px;
      margin: 0 auto;
      padding: 0 40px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-links {
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-scale-800);
      line-height: 1.4;
    }

    .footer-copy {
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--gray-scale-500);
      line-height: normal;
    }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      .article-wrapper {
        padding: 60px 20px;
      }

      .article-title {
        font-size: 22px;
      }

      .article-inner {
        gap: 40px;
      }

      .gnb-container {
        gap: 0;
        justify-content: space-between;
        height: 50px;
      }

      .gnb-inner {
        display: none;
      }

      .mobile-menu-toggle {
        display: flex;
      }

      .gnb-backdrop {
        display: block;
      }

      .page-content {
        padding-top: 50px;
      }
    }

  </style>
</head>

<body>

  <!-- GNB -->
  <header class="gnb">
    <div class="container gnb-container">
      <a href="index.html" class="gnb-logo" id="gnbLogo">
        <img src="assets/svg/logo_kr.svg" alt="와르르" />
      </a>
      <div class="gnb-inner" id="gnbInner">
        <nav class="gnb-nav" id="gnbNav">
          <a href="index.html#about" class="nav-item">와르르 소개</a>
          <a href="index.html#newsroom" class="nav-item active">뉴스룸</a>
          <a href="index.html#qa" class="nav-item">FAQ</a>
        </nav>
        <div class="lang-selector" id="langSelector">
          <button class="lang-btn active" data-lang="kor">KOR</button>
          <button class="lang-btn" data-lang="eng">ENG</button>
        </div>
      </div>
      <button class="mobile-menu-toggle" id="menuToggle" aria-label="메뉴 열기">
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
      </button>
    </div>
  </header>

  <!-- Mobile Drawer -->
  <div class="gnb-backdrop" id="gnbBackdrop"></div>
  <div class="gnb-mobile-overlay" id="mobileOverlay">
    <a href="index.html#about" class="mobile-nav-item">와르르 소개</a>
    <a href="index.html#newsroom" class="mobile-nav-item">뉴스룸</a>
    <a href="index.html#qa" class="mobile-nav-item">FAQ</a>
    <div class="mobile-lang-selector">
      <button class="lang-btn active" data-lang="kor">KOR</button>
      <button class="lang-btn" data-lang="eng">ENG</button>
    </div>
  </div>

  <!-- Article Content -->
  <main class="page-content">
    <div class="article-wrapper">
      <div class="article-inner">

        <div class="article-header">
          <h1 class="article-title" id="articleTitle">와르르, 정식 출시 — 콘텐츠 감상을 함께 기록하는 첫 서비스</h1>
          <p class="article-date" id="articleDate">2027. 03. 21.</p>
        </div>

        <div class="article-divider"></div>

        <div class="article-body">
          <p class="article-text" id="articleText"></p>
          <div class="article-image">
            <img id="articleImg" src="" alt="" />
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div class="footer-links" id="footerLinks">개인정보처리방침&nbsp;&nbsp;&nbsp;&nbsp;이용약관&nbsp;&nbsp;&nbsp;&nbsp;보안</div>
      <p class="footer-copy">Copyright ⓒ HI5. All Rights Reserved<br>E-mail: waruru@gmail.com</p>
    </div>
  </footer>

  <script>
    // ── Mobile Menu ──
    const menuToggle = document.getElementById('menuToggle');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const gnbBackdrop = document.getElementById('gnbBackdrop');

    function toggleMenu(open) {
      menuToggle.classList.toggle('open', open);
      mobileOverlay.classList.toggle('open', open);
      gnbBackdrop.classList.toggle('open', open);
    }
    menuToggle.addEventListener('click', () => toggleMenu(!menuToggle.classList.contains('open')));
    gnbBackdrop.addEventListener('click', () => toggleMenu(false));

    // ── 기사 데이터 ──
    const ARTICLES = {
      1: {
        img: 'assets/Img/Newsroom_Img_1.png',
        ko: {
          title: '와르르 1주년, 누적 후기 10만 건 달성',

        },
        en: {
          title: 'Waruru Hits 100,000 Reviews on Its First Anniversary',
          date: 'Jul 30, 2027',
          body: `Waruru, the co-recording platform for content reviews, has reached 100,000 cumulative reviews on the occasion of its first anniversary since official launch.<br><br>Since its launch in March of last year, Waruru has seen steady user growth, achieving this milestone within just one year. Users have been actively leaving reviews across a wide range of content categories including movies, dramas, animations, and concerts.<br><br>By category, drama and series reviews accounted for the largest share at 38%, followed by movies (27%), animation (21%), and concerts (14%). The co-recording feature — which lets users share a journal with friends — also saw consistent growth, with approximately 40% of all reviews written in co-recording mode.<br><br>A Waruru representative said, "Reaching 100,000 reviews in just one year is thanks to the users who found joy in recording together. We look forward to introducing more features to provide an even richer recording experience."`,
        },
      },
      2: {
        img: 'assets/Img/Newsroom_Img_2.png',
        ko: {
          title: "와르르 앱, 플레이스토어 '이주의 신규 추천' 선정",
          date: '2027. 07. 19.',
          body: `콘텐츠 감상 공동기록 플랫폼 '와르르(Waruru)'가 구글 플레이스토어의 '이주의 신규 추천' 앱으로 선정됐다.<br><br>플레이스토어 '이주의 신규 추천'은 구글이 매주 새롭게 출시되거나 주목할 만한 업데이트를 선보인 앱 중 품질과 사용자 경험이 뛰어난 앱을 선별해 소개하는 코너다.<br><br>와르르는 콘텐츠 감상을 기록하고 친구와 함께 공유하는 독창적인 서비스 경험, 직관적인 UI 디자인, 그리고 작성 키트를 통한 후기 작성 지원 기능 등이 높은 평가를 받아 이번 추천 앱에 이름을 올렸다.<br><br>와르르 관계자는 "플레이스토어에서 이번 추천을 받게 되어 영광이며, 더 많은 분들이 와르르를 통해 콘텐츠 감상을 함께 기록하는 즐거움을 경험하실 수 있기를 바란다"고 밝혔다.`,
        },
        en: {
          title: "Waruru Named Google Play's 'New App of the Week'",
          date: 'Jul 19, 2027',
          body: `Waruru, the co-recording platform for content reviews, has been selected as Google Play's "New App of the Week."<br><br>Google Play's "New App of the Week" is a featured section where Google highlights newly launched or notably updated apps that stand out for their quality and user experience.<br><br>Waruru was recognized for its unique approach to recording and sharing content impressions with friends, its intuitive UI design, and its writing kit feature that helps users craft more thoughtful reviews.<br><br>A Waruru representative said, "We're honored to be featured on Google Play, and we hope even more people will discover the joy of recording content together through Waruru."`,
        },
      },
      3: {
        img: 'assets/Img/Newsroom_Img_3.png',
        ko: {
          title: '와르르, 정식 출시 — 콘텐츠 감상을 함께 기록하는 첫 서비스',
          date: '2027. 03. 21.',
          body: `콘텐츠 감상 공동기록 플랫폼 '와르르(Waruru)'가 정식 출시됐다.<br><br>와르르는 영화, 드라마, 애니메이션, 콘서트 등 다양한 콘텐츠를 감상한 뒤 느낀 생각과 경험을 기록하고 공유할 수 있는 서비스다.<br>기존 후기 플랫폼이 개인의 감상을 남기는 데 초점을 맞췄다면, 와르르는 같은 작품을 본 사람들과 함께 기록을 쌓아가는 경험에 주목했다.<br><br>사용자는 작품별로 기록장을 생성하거나 참여할 수 있으며, 친구를 초대해 각자의 감상을 한 공간에 남길 수 있다. 또한 명대사, OST, 장르별 질문 등으로 구성된 작성 키트를 제공해 보다 쉽게 후기를 작성할 수 있도록 지원한다.<br><br>와르르 관계자는 "콘텐츠를 소비하는 경험이 끝나는 순간이 아니라, 함께 이야기하고 기록하는 과정까지 이어질 수 있도록 서비스를 기획했다"며 "앞으로도 다양한 콘텐츠 카테고리와 기능을 확장해 나갈 예정"이라고 밝혔다.<br><br>한편 와르르는 모바일 앱을 통해 이용할 수 있으며, 콘텐츠를 좋아하는 사람들의 다양한 시선과 감상을 한곳에서 만나볼 수 있다.`,
        },
        en: {
          title: 'Waruru Officially Launches — The First Service for Co-Recording Content Reviews',
          date: 'Mar 21, 2027',
          body: `Waruru, a co-recording platform for content reviews, has officially launched.<br><br>Waruru is a service that lets users record and share their thoughts and experiences after watching movies, dramas, animations, concerts, and more.<br>While existing review platforms focus on individual impressions, Waruru centers on the experience of building a shared record with others who watched the same content.<br><br>Users can create or join a journal for each piece of content, and invite friends to leave their own impressions in a shared space. A writing kit — featuring memorable quotes, OSTs, and genre-specific prompts — is also provided to make writing reviews easier.<br><br>A Waruru representative said, "We designed the service so that the experience of consuming content doesn't end when it's over — it continues through conversation and shared records. We plan to keep expanding content categories and features going forward."<br><br>Waruru is available via mobile app, bringing together a wide range of perspectives and impressions from people who love content.`,
        },
      },
      4: {
        img: 'assets/Img/Newsroom_Img_4.png',
        ko: {
          title: '와르르 베타테스트 참여자 1,000명 돌파',
          date: '2026. 12. 05.',
          body: `콘텐츠 감상 공동기록 플랫폼 '와르르(Waruru)'의 베타테스트 참여자 수가 1,000명을 돌파했다.<br><br>와르르는 지난 11월부터 사전 신청자를 대상으로 베타테스트를 진행해왔으며, 약 한 달 만에 참여자 1,000명을 넘어섰다. 베타테스트 기간 동안 수집된 피드백은 정식 출시 전 서비스 완성도를 높이는 데 활용될 예정이다.<br><br>베타 참여자들은 서비스의 핵심 기능인 공동 기록, 작성 키트, 콘텐츠 검색 등을 직접 체험하고 개선 의견을 제출했다. 특히 친구와 함께 같은 기록장을 공유하는 기능에 대한 반응이 긍정적이었으며, 다양한 콘텐츠 카테고리 확대에 대한 요청도 많았다.<br><br>와르르 관계자는 "베타테스트에 참여해 주신 모든 분들께 감사드리며, 수집된 소중한 의견들을 반영해 더욱 완성도 높은 서비스로 정식 출시를 준비하겠다"고 말했다.`,
        },
        en: {
          title: 'Waruru Beta Testers Surpass 1,000',
          date: 'Dec 5, 2026',
          body: `The number of beta testers for Waruru, a co-recording platform for content reviews, has surpassed 1,000.<br><br>Waruru began beta testing with pre-registered users in November, reaching the 1,000-tester milestone in just about a month. Feedback collected during the beta period will be used to improve the service before its official launch.<br><br>Beta participants tested core features including co-recording, the writing kit, and content search, and submitted suggestions for improvement. The response to the co-journal sharing feature — which lets friends share the same journal — was particularly positive, and many users requested an expanded range of content categories.<br><br>A Waruru representative said, "We're grateful to everyone who participated in the beta test. We'll reflect their valuable feedback to ensure an even more polished service at launch."`,
        },
      },
    };

    // ── 쿼리 파라미터에서 기사 ID 읽기 ──
    const params = new URLSearchParams(window.location.search);
    const articleId = parseInt(params.get('id')) || 3;
    const article = ARTICLES[articleId] || ARTICLES[3];

    // 기사 이미지 초기 세팅
    document.getElementById('articleImg').src = article.img;

    // ── i18n ──
    const NAV = {
      ko: { logo: 'assets/svg/logo_kr.svg', about: '와르르 소개', newsroom: '뉴스룸', faq: 'FAQ', footer: '개인정보처리방침&nbsp;&nbsp;&nbsp;&nbsp;이용약관&nbsp;&nbsp;&nbsp;&nbsp;보안' },
      en: { logo: 'assets/svg/logo_En.svg', about: 'About', newsroom: 'Newsroom', faq: 'FAQ', footer: 'Privacy Policy&nbsp;&nbsp;&nbsp;&nbsp;Terms of Use&nbsp;&nbsp;&nbsp;&nbsp;Security' },
    };

    let currentLang = localStorage.getItem('waruru-lang') || 'ko';

    function applyLang(lang) {
      const n = NAV[lang];
      const a = article[lang];
      document.querySelector('#gnbLogo img').src = n.logo;
      document.querySelectorAll('#gnbNav .nav-item, #mobileOverlay .mobile-nav-item').forEach(el => {
        const href = el.getAttribute('href');
        if (href.includes('#about')) el.textContent = n.about;
        else if (href.includes('#newsroom')) el.textContent = n.newsroom;
        else if (href.includes('#qa')) el.textContent = n.faq;
      });
      document.getElementById('articleTitle').textContent = a.title;
      document.getElementById('articleDate').textContent = a.date;
      document.getElementById('articleText').innerHTML = a.body;
      document.getElementById('articleImg').alt = a.title;
      document.getElementById('footerLinks').innerHTML = n.footer;
      document.title = `${a.title} — 와르르`;
    }

    // 초기 언어 적용 (저장된 언어 반영)
    if (currentLang === 'en') {
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.lang === 'eng')
      );
    }
    applyLang(currentLang);

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.lang === 'eng' ? 'en' : 'ko';
        if (lang === currentLang) return;
        currentLang = lang;
        localStorage.setItem('waruru-lang', lang);
        document.querySelectorAll('.lang-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.lang === btn.dataset.lang)
        );
        applyLang(lang);
      });
    });
  </script>

</body>
</html>
